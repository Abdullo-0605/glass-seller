{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product - Admin{% endblock %}

{% block admin_content %}
<h3 class="fw-bold mb-4">
    <i class="bi bi-{{ 'pencil' if product else 'plus-lg' }} me-2"></i>
    {{ 'Edit' if product else 'Add New' }} Product
</h3>

<div class="card" style="max-width:800px;">
    <div class="card-body">
        <form method="post" action="{{ url_for('admin.edit_product', product_id=product.id) if product else url_for('admin.add_product') }}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required value="{{ product.name if product else '' }}" placeholder="Front Windshield - Toyota Camry 2020-2024">
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Category</label>
                    <input type="text" name="category" class="form-control" value="{{ product.category if product else 'Windshield' }}" list="cat-list" placeholder="Windshield">
                    <datalist id="cat-list">
                        <option value="Windshield">
                        <option value="Side Window">
                        <option value="Rear Window">
                        <option value="Quarter Glass">
                        <option value="Sunroof">
                        <option value="Accessories">
                    </datalist>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Part Number</label>
                    <input type="text" name="part_number" class="form-control" value="{{ product.part_number if product else '' }}" placeholder="WS-TCAM-2024">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Car Make</label>
                    <input type="text" name="car_make" class="form-control" value="{{ product.car_make if product else '' }}" placeholder="Toyota">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Car Model</label>
                    <input type="text" name="car_model" class="form-control" value="{{ product.car_model if product else '' }}" placeholder="Camry">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Year Start</label>
                    <input type="number" name="car_year_start" class="form-control" value="{{ product.car_year_start if product and product.car_year_start else '' }}" placeholder="2020">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Year End</label>
                    <input type="number" name="car_year_end" class="form-control" value="{{ product.car_year_end if product and product.car_year_end else '' }}" placeholder="2024">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Cost (Wholesale) $</label>
                    <input type="number" name="cost" class="form-control" step="0.01" min="0" value="{{ product.cost if product else '0' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Selling Price $ <span class="text-danger">*</span></label>
                    <input type="number" name="price" class="form-control" step="0.01" min="0" required value="{{ product.price if product else '0' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Stock Quantity</label>
                    <input type="number" name="stock_quantity" class="form-control" min="0" value="{{ product.stock_quantity if product else '0' }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ product.description if product else '' }}</textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ 'Save Changes' if product else 'Create Product' }}</button>
                <a href="{{ url_for('admin.products') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
