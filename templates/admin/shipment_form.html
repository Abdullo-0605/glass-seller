{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if shipment else 'New' }} Shipment - Admin{% endblock %}

{% block admin_content %}
<h3 class="fw-bold mb-4"><i class="bi bi-truck me-2"></i>New Shipment</h3>

<div class="card" style="max-width:700px;">
    <div class="card-body">
        <form method="post" action="{{ url_for('admin.add_shipment') }}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Supplier <span class="text-danger">*</span></label>
                <input type="text" name="supplier" class="form-control" required placeholder="Pacific Glass Distributors">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Invoice Number</label>
                    <input type="text" name="invoice_number" class="form-control" placeholder="PGD-2024-0312">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Total Cost $</label>
                    <input type="number" name="total_cost" class="form-control" step="0.01" min="0" value="0">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select">
                    <option value="PENDING">Pending</option>
                    <option value="RECEIVED">Received</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Create Shipment</button>
                <a href="{{ url_for('admin.shipments') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
