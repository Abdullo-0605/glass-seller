{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <!-- Admin Sidebar -->
        <div class="col-lg-2 mb-4">
            <div class="card p-3">
                <h6 class="fw-bold text-uppercase text-muted mb-3"><i class="bi bi-gear me-1"></i>Admin Panel</h6>
                <a href="{{ url_for('admin.dashboard') }}" class="sidebar-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="{{ url_for('admin.products') }}" class="sidebar-link {% if 'product' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-box-seam me-2"></i>Products
                </a>
                <a href="{{ url_for('admin.orders') }}" class="sidebar-link {% if 'order' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-receipt me-2"></i>Orders
                </a>
                <a href="{{ url_for('admin.shipments') }}" class="sidebar-link {% if 'shipment' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-truck me-2"></i>Shipments
                </a>
                <a href="{{ url_for('admin.invoices') }}" class="sidebar-link {% if 'invoice' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-file-earmark-text me-2"></i>Invoices
                </a>
                <a href="{{ url_for('admin.manage_users') }}" class="sidebar-link {% if 'user' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-people me-2"></i>Users
                </a>
                <hr>
                <a href="{{ url_for('admin.chat') }}" class="sidebar-link {% if 'chat' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-chat-dots me-2"></i>AI Analytics
                </a>
                <hr>
                <a href="{{ url_for('admin.import_data') }}" class="sidebar-link {% if 'import' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-cloud-upload me-2"></i>Import Data
                </a>
                <a href="{{ url_for('admin.export_products_route') }}" class="sidebar-link">
                    <i class="bi bi-download me-2"></i>Export Products
                </a>
                <a href="{{ url_for('admin.export_orders_route') }}" class="sidebar-link">
                    <i class="bi bi-download me-2"></i>Export Orders
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-10">
            {% block admin_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
