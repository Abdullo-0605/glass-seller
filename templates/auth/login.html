{% extends "base.html" %}
{% block title %}Log In - Winaris Glass LLC{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-fill-check text-primary" style="font-size:2.5rem;"></i>
                        <h3 class="fw-bold mt-2">Welcome Back</h3>
                        <p class="text-muted">Log in to your Winaris Glass account</p>
                    </div>

                    <form method="post">
                        {% if request.args.get('next') %}
                        <input type="hidden" name="next" value="{{ request.args.get('next') }}">
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control" required autofocus placeholder="Enter username or email">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" required placeholder="Enter password">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                        </button>
                    </form>

                    <hr>
                    <p class="text-center text-muted mb-0">
                        Don't have an account?
                        <a href="{{ url_for('auth.register') }}" class="fw-semibold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
